name: Build and Push MLflow Model to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install MLflow
        run: pip install mlflow==2.19.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run training to get model artifact
        run: |
          cd MLProject
          pip install -r conda.yaml || echo "Using conda.yaml for MLflow"
          pip install pandas numpy scikit-learn tensorflow tensorboard
          python modelling.py

      - name: Build Docker image with MLflow
        run: |
          cd MLProject
          # Assume the model is saved to mlruns/0/RUN_ID/artifacts/model
          RUN_ID=$(ls mlruns/0 | grep -v meta.yaml | head -n 1)
          mlflow models build-docker -m mlruns/0/$RUN_ID/artifacts/lstm_model -n ${{ secrets.DOCKERHUB_USERNAME }}/pln-forecasting-model:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pln-forecasting-model:latest
